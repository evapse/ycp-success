<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement réussi — YouTube Creator Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --red: #FF3B5C; --orange: #FF6B35; --green: #00D084; --bg: #07070A; --card: #0E0E14; --border: #1C1C28; --text: #F0F0F8; --muted: #5A5A72; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; overflow: hidden; }

    /* Orbs */
    .orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12; }
    .orb-1 { width: 500px; height: 500px; background: var(--green); top: -200px; left: -100px; animation: drift 12s ease-in-out infinite; }
    .orb-2 { width: 400px; height: 400px; background: var(--red); bottom: -150px; right: -100px; animation: drift 15s ease-in-out infinite reverse; }
    @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }

    /* Card */
    .card { position: relative; z-index: 1; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 44px 36px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.6); animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1) both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

    /* Ring */
    .ring-wrap { width: 90px; height: 90px; margin: 0 auto 24px; position: relative; }
    .ring-wrap svg { width: 100%; height: 100%; }
    .ring-bg { fill: none; stroke: #1a2a1a; stroke-width: 4; }
    .ring-progress { fill: none; stroke: var(--green); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 251; transform: rotate(-90deg); transform-origin: center; animation: drawRing 0.8s cubic-bezier(0.4,0,0.2,1) 0.4s forwards; }
    @keyframes drawRing { to { stroke-dashoffset: 0; } }
    .ring-emoji { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 34px; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.1s both; }
    @keyframes popIn { from{opacity:0;transform:scale(0.3)} to{opacity:1;transform:scale(1)} }

    h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    h1 span { background: linear-gradient(90deg, var(--green), #4ade80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

    /* Status badge */
    .status-badge { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 20px; transition: all 0.3s; }
    .status-badge.loading { background: rgba(90,90,114,0.1); border: 1px solid var(--border); color: var(--muted); }
    .status-badge.success { background: rgba(0,208,132,0.1); border: 1px solid rgba(0,208,132,0.25); color: var(--green); }
    .status-badge.error { background: rgba(255,59,92,0.1); border: 1px solid rgba(255,59,92,0.25); color: var(--red); }

    /* Features */
    .features { background: #0a1a0a; border: 1px solid #1a2a1a; border-radius: 12px; padding: 16px; margin-bottom: 24px; text-align: left; }
    .features-title { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .feat { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; color: #A0A0B8; border-bottom: 1px solid #0f1a0f; opacity: 0; animation: featIn 0.3s ease forwards; }
    .feat:last-child { border-bottom: none; }
    .feat:nth-child(1){animation-delay:1.2s}.feat:nth-child(2){animation-delay:1.35s}.feat:nth-child(3){animation-delay:1.5s}.feat:nth-child(4){animation-delay:1.65s}.feat:nth-child(5){animation-delay:1.8s}
    @keyframes featIn { to{opacity:1} }
    .feat-dot { width: 18px; height: 18px; background: rgba(0,208,132,0.1); border: 1px solid rgba(0,208,132,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }

    /* Button */
    .btn { width: 100%; background: linear-gradient(135deg, var(--red), var(--orange)); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; margin-bottom: 10px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,59,92,0.4); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-secondary { width: 100%; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 11px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .btn-secondary:hover { border-color: #333; color: var(--text); }

    /* Loader dots */
    .dots { display: inline-flex; gap: 3px; margin-left: 4px; }
    .dots span { width: 4px; height: 4px; background: currentColor; border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
    .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
    @keyframes dot { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }
  </style>
</head>
<body>
<div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="card">
  <!-- Ring animation -->
  <div class="ring-wrap">
    <svg viewBox="0 0 90 90">
      <circle class="ring-bg" cx="45" cy="45" r="40"/>
      <circle class="ring-progress" cx="45" cy="45" r="40"/>
    </svg>
    <div class="ring-emoji">✅</div>
  </div>

  <h1>Paiement <span>réussi !</span></h1>
  <p class="sub">Bienvenue dans YouTube Creator Pro 🎬<br>Ton accès PRO est en cours d'activation…</p>

  <!-- Status dynamique -->
  <div class="status-badge loading" id="status">
    Activation de l'extension<span class="dots"><span></span><span></span><span></span></span>
  </div>

  <!-- Features débloquées -->
  <div class="features">
    <div class="features-title">Ce qui vient d'être débloqué</div>
    <div class="feat"><div class="feat-dot">✓</div>Analyses illimitées</div>
    <div class="feat"><div class="feat-dot">✓</div>Analyse IA des miniatures</div>
    <div class="feat"><div class="feat-dot">✓</div>Générateur d'idées vidéos</div>
    <div class="feat"><div class="feat-dot">✓</div>Tous les mots-clés SEO</div>
    <div class="feat"><div class="feat-dot">✓</div>Recommandations avancées</div>
  </div>

  <button class="btn" id="btn-open" disabled>🎬 Ouvrir YouTube</button>
  <button class="btn-secondary" id="btn-manual" style="display:none">⚙️ Activation manuelle</button>
</div>

<script>
  // ─── TON EXTENSION ID ───
  const EXTENSION_ID = 'amagadmenafkfjjhhbaobpihoehnbkem';

  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id') || ('manual_' + Date.now());

  const statusEl = document.getElementById('status');
  const btnOpen = document.getElementById('btn-open');
  const btnManual = document.getElementById('btn-manual');

  function setStatus(type, text) {
    statusEl.className = 'status-badge ' + type;
    statusEl.innerHTML = text;
  }

  function onSuccess() {
    setStatus('success', '⭐ Extension activée — badge PRO visible !');
    btnOpen.disabled = false;
  }

  function onError() {
    setStatus('error', '⚠️ Active manuellement via le bouton ci-dessous');
    btnOpen.disabled = false;
    btnManual.style.display = 'block';
  }

  // Envoyer le message à l'extension Chrome
  function activateExtension() {
    if (typeof chrome === 'undefined' || !chrome.runtime) {
      // Pas dans Chrome ou extension non installée
      setTimeout(onError, 500);
      return;
    }

    try {
      chrome.runtime.sendMessage(
        EXTENSION_ID,
        {
          action: 'ACTIVATE_PREMIUM',
          sessionId: sessionId,
          email: params.get('customer_email') || '',
          source: 'stripe_success_page'
        },
        (response) => {
          if (chrome.runtime.lastError || !response) {
            onError();
          } else if (response.success) {
            onSuccess();
          } else {
            onError();
          }
        }
      );
    } catch(e) {
      onError();
    }
  }

  // Bouton ouvrir YouTube
  btnOpen.addEventListener('click', () => {
    window.open('https://www.youtube.com', '_blank');
  });

  // Bouton activation manuelle
  btnManual.addEventListener('click', () => {
    // Ouvrir YouTube avec le token dans l'URL — le background.js le détecte
    const token = encodeURIComponent(JSON.stringify({ sessionId, ts: Date.now() }));
    window.open('https://www.youtube.com/#ycp-activate=' + token, '_blank');
    setStatus('success', '✅ Ouvre l\'extension sur YouTube pour finaliser');
  });

  // Lancer l'activation après les animations
  setTimeout(activateExtension, 1800);
</script>
</body>
</html>
